name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options: [prod, staging]
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy-azure.yml"

permissions:
  id-token: write       # OIDC federation with Azure
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/sj-planner-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/sj-planner-frontend

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        name: Compute image tags
        run: |
          TAG="${{ inputs.image_tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_SHA::12}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "backend_image=${REGISTRY}/${IMAGE_NAME_BACKEND}:$TAG"  >> $GITHUB_OUTPUT
          echo "frontend_image=${REGISTRY}/${IMAGE_NAME_FRONTEND}:$TAG" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest

  deploy:
    name: Deploy infrastructure & app
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infra (Bicep)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: southeastasia
          template: ./infra/main.bicep
          parameters: >-
            rgName=rg-sjplanner-${{ inputs.environment || 'prod' }}
            backendImage=${{ needs.build-and-push.outputs.backend_image }}
            pgPassword=${{ secrets.PG_PASSWORD }}
          failOnStdErr: false

      - name: Update Container App image
        run: |
          az containerapp update \
            --name sj-planner-api \
            --resource-group rg-sjplanner-${{ inputs.environment || 'prod' }} \
            --image ${{ needs.build-and-push.outputs.backend_image }}

      - name: Smoke-test /api/health
        run: |
          URL=$(az containerapp show \
            --name sj-planner-api \
            --resource-group rg-sjplanner-${{ inputs.environment || 'prod' }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          for i in 1 2 3 4 5; do
            if curl -fsS "https://${URL}/api/health"; then
              echo "✓ healthy"
              exit 0
            fi
            sleep 10
          done
          echo "✗ health check failed"
          exit 1
